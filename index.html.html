<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blinkit HK Attendance Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Nunito', sans-serif; background: #f5f5f5; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { opacity: 1; }
    select option { background: white; color: #1B1B1B; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // ============================================================
    // ✅ VENDORS — Apne actual vendor names aur properties yahan
    // ============================================================
    const VENDORS = {
      "Vendor 1 - CleanPro": [
        "Blinkit - Sector 14", "Blinkit - MG Road", "Blinkit - Cyber City",
        "Blinkit - Sohna Road", "Blinkit - Golf Course Ext"
      ],
      "Vendor 2 - SwiftHK": [
        "Blinkit - Connaught Place", "Blinkit - Lajpat Nagar", "Blinkit - Saket",
        "Blinkit - Dwarka", "Blinkit - Rohini"
      ],
      "Vendor 3 - ProShine": [
        "Blinkit - Andheri", "Blinkit - Bandra", "Blinkit - Powai",
        "Blinkit - Thane", "Blinkit - Borivali"
      ],
    };

    // ============================================================
    // ✅ GOOGLE APPS SCRIPT URL — Aapka URL already set hai
    // ============================================================
    const SCRIPT_URL = "https://script.google.com/a/macros/grofers.com/s/AKfycbzEskLQeNIuK0nrhWCwbYbtyYcLMsMXiGNQ2bTG0ce7GS-BYYNHgBCpUFp9OEyJIXB2/exec";

    const SHIFTS = [
      { key: "SA", label: "Shift A", time: "Morning" },
      { key: "SB", label: "Shift B", time: "Afternoon" },
      { key: "SC", label: "Shift C", time: "Night" },
    ];

    const today = new Date().toISOString().split("T")[0];
    const formatDate = (d) => new Date(d).toLocaleDateString("en-IN", { day: "2-digit", month: "short", year: "numeric" });
    const getTimestamp = () => new Date().toLocaleString("en-IN", { day: "2-digit", month: "short", year: "numeric", hour: "2-digit", minute: "2-digit", second: "2-digit" });

    const getVendorFromURL = () => {
      try {
        const params = new URLSearchParams(window.location.search);
        const v = params.get("vendor");
        return v && VENDORS[v] ? v : null;
      } catch { return null; }
    };

    function App() {
      const prefilledVendor = getVendorFromURL();
      const [step, setStep] = useState(prefilledVendor ? "fill" : "select");
      const [vendor, setVendor] = useState(prefilledVendor || "");
      const [date, setDate] = useState(today);
      const [counts, setCounts] = useState({});
      const [submitted, setSubmitted] = useState([]);
      const [submitting, setSubmitting] = useState(false);
      const [timestamp, setTimestamp] = useState("");

      const properties = VENDORS[vendor] || [];

      const updateCount = (p, s, v) => {
        if (v === "" || (parseInt(v) >= 0 && parseInt(v) <= 999)) {
          setCounts(prev => ({ ...prev, [p]: { ...(prev[p] || {}), [s]: v } }));
        }
      };
      const getCount = (p, s) => counts[p]?.[s] || "";
      const totalForProp = (p) => SHIFTS.reduce((sum, s) => sum + (parseInt(counts[p]?.[s.key]) || 0), 0);
      const grandTotal = properties.reduce((sum, p) => sum + totalForProp(p), 0);

      const handleSubmit = async () => {
        setSubmitting(true);
        const ts = getTimestamp();
        setTimestamp(ts);
        const rows = properties.map(p => ({
          timestamp: ts, vendor, date, property: p,
          shiftA: getCount(p, "SA") || 0,
          shiftB: getCount(p, "SB") || 0,
          shiftC: getCount(p, "SC") || 0,
          total: totalForProp(p),
        }));
        try {
          await fetch(SCRIPT_URL, {
            method: "POST", mode: "no-cors",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ rows }),
          });
        } catch (e) { console.log("Submitted"); }
        setSubmitted(rows);
        setSubmitting(false);
        setStep("done");
      };

      const cardStyle = { background: "white", borderRadius: 12, padding: "20px 18px", boxShadow: "0 2px 16px rgba(0,0,0,0.07)", marginBottom: 14 };
      const labelStyle = { display: "block", fontSize: 12, fontWeight: 700, color: "#555", marginBottom: 7, letterSpacing: 0.5 };
      const inputStyle = { width: "100%", background: "#fafafa", border: "1.5px solid #eee", color: "#1B1B1B", padding: "11px 14px", borderRadius: 8, fontSize: 14, outline: "none", boxSizing: "border-box", fontFamily: "Nunito, sans-serif" };
      const btnPrimary = { width: "100%", background: "#FDCC0D", color: "#1B1B1B", border: "none", padding: "14px", borderRadius: 10, fontSize: 14, fontWeight: 800, cursor: "pointer", fontFamily: "Nunito, sans-serif" };
      const btnSecondary = { background: "white", color: "#1B1B1B", border: "1.5px solid #eee", borderRadius: 10, fontSize: 13, fontWeight: 700, cursor: "pointer", fontFamily: "Nunito, sans-serif", padding: "13px 20px" };

      return (
        <div style={{ minHeight: "100vh", background: "#f5f5f5", position: "relative", overflow: "hidden" }}>

          {/* Watermark */}
          <div style={{ position: "fixed", top: "50%", left: "50%", transform: "translate(-50%, -50%) rotate(-30deg)", fontSize: 120, fontWeight: 900, color: "rgba(253,204,13,0.07)", userSelect: "none", pointerEvents: "none", whiteSpace: "nowrap", zIndex: 0 }}>
            ⚡ blinkit ⚡ blinkit ⚡
          </div>
          <div style={{ position: "fixed", top: "15%", left: "50%", transform: "translate(-50%, -50%) rotate(-30deg)", fontSize: 70, fontWeight: 900, color: "rgba(253,204,13,0.04)", userSelect: "none", pointerEvents: "none", whiteSpace: "nowrap", zIndex: 0 }}>
            ⚡ blinkit ⚡ blinkit ⚡ blinkit ⚡
          </div>

          {/* Header */}
          <div style={{ background: "#FDCC0D", padding: "14px 20px", display: "flex", alignItems: "center", justifyContent: "space-between", boxShadow: "0 2px 12px rgba(253,204,13,0.4)", position: "relative", zIndex: 10 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <div style={{ background: "#1B1B1B", borderRadius: 8, width: 36, height: 36, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20, fontWeight: 900, color: "#FDCC0D" }}>⚡</div>
              <div>
                <div style={{ fontSize: 17, fontWeight: 900, color: "#1B1B1B" }}>blinkit</div>
                <div style={{ fontSize: 10, fontWeight: 700, color: "#1B1B1B", opacity: 0.55, letterSpacing: 1.5 }}>HK ATTENDANCE PORTAL</div>
              </div>
            </div>
            <div style={{ background: "#1B1B1B", borderRadius: 20, padding: "5px 13px", fontSize: 11, fontWeight: 700, color: "#FDCC0D" }}>{formatDate(today)}</div>
          </div>

          <div style={{ maxWidth: 580, margin: "0 auto", padding: "20px 16px", position: "relative", zIndex: 5 }}>

            {/* Progress Bar */}
            {step !== "done" && (
              <div style={{ display: "flex", gap: 6, marginBottom: 20 }}>
                {["Vendor Info", "Fill Count"].map((label, i) => (
                  <div key={i} style={{ flex: 1 }}>
                    <div style={{ height: 4, borderRadius: 4, background: (step === "select" && i === 0) || step === "fill" ? "#FDCC0D" : "#e0e0e0", transition: "background 0.3s" }} />
                    <div style={{ fontSize: 10, fontWeight: 700, color: "#aaa", marginTop: 4, letterSpacing: 0.5 }}>{label}</div>
                  </div>
                ))}
              </div>
            )}

            {/* ── STEP 1: Vendor Select ── */}
            {step === "select" && (
              <div style={cardStyle}>
                <h2 style={{ fontSize: 18, fontWeight: 800, color: "#1B1B1B", marginBottom: 4 }}>Daily Attendance Entry</h2>
                <p style={{ fontSize: 13, color: "#888", marginBottom: 24 }}>Select your vendor account and date</p>

                <label style={labelStyle}>Vendor Name *</label>
                <select value={vendor} onChange={e => setVendor(e.target.value)} style={inputStyle}>
                  <option value="">-- Select Vendor --</option>
                  {Object.keys(VENDORS).map(v => <option key={v} value={v}>{v}</option>)}
                </select>

                <label style={{ ...labelStyle, marginTop: 18 }}>Date *</label>
                <input type="date" value={date} onChange={e => setDate(e.target.value)} style={inputStyle} />

                {vendor && (
                  <div style={{ background: "#FFFBEA", border: "1px solid #FDCC0D", borderRadius: 8, padding: "10px 14px", marginTop: 16, fontSize: 12, color: "#7A6000" }}>
                    ⚡ <b>{VENDORS[vendor].length} properties</b> linked to this vendor
                  </div>
                )}

                <button onClick={() => setStep("fill")} disabled={!vendor} style={{ ...btnPrimary, marginTop: 24, opacity: vendor ? 1 : 0.4 }}>
                  Continue → Fill Attendance
                </button>
              </div>
            )}

            {/* ── STEP 2: Fill Counts ── */}
            {step === "fill" && (
              <div>
                {/* Info Bar */}
                <div style={{ ...cardStyle, padding: "12px 16px", marginBottom: 14, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <div>
                    <div style={{ fontSize: 13, fontWeight: 700, color: "#1B1B1B" }}>{vendor}</div>
                    <div style={{ fontSize: 11, color: "#888", marginTop: 2 }}>📅 {formatDate(date)}</div>
                  </div>
                  <div style={{ textAlign: "right" }}>
                    <div style={{ fontSize: 11, color: "#aaa" }}>Total Staff</div>
                    <div style={{ fontSize: 26, fontWeight: 900, color: "#FDCC0D", lineHeight: 1 }}>{grandTotal}</div>
                  </div>
                </div>

                {/* Shift legend */}
                <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
                  {SHIFTS.map(s => (
                    <div key={s.key} style={{ flex: 1, background: "white", borderRadius: 8, padding: "8px", textAlign: "center", border: "1.5px solid #eee" }}>
                      <div style={{ fontSize: 13, fontWeight: 800, color: "#1B1B1B" }}>{s.label}</div>
                      <div style={{ fontSize: 9, color: "#bbb", fontWeight: 600, marginTop: 2 }}>{s.time}</div>
                    </div>
                  ))}
                </div>

                {/* Col Headers */}
                <div style={{ display: "grid", gridTemplateColumns: "1fr 72px 72px 72px 56px", gap: 6, padding: "0 8px", marginBottom: 6 }}>
                  {["Property", "Shift A", "Shift B", "Shift C", "Total"].map(h => (
                    <div key={h} style={{ fontSize: 10, fontWeight: 700, color: "#bbb", letterSpacing: 0.5, textAlign: h === "Property" ? "left" : "center" }}>{h}</div>
                  ))}
                </div>

                {/* Rows */}
                {properties.map(prop => (
                  <div key={prop} style={{ display: "grid", gridTemplateColumns: "1fr 72px 72px 72px 56px", gap: 6, alignItems: "center", background: "white", borderRadius: 8, padding: "10px 8px", marginBottom: 6, boxShadow: "0 1px 4px rgba(0,0,0,0.05)", borderLeft: totalForProp(prop) > 0 ? "3px solid #FDCC0D" : "3px solid #eee" }}>
                    <span style={{ fontSize: 12, fontWeight: 600, color: "#333", paddingLeft: 4, lineHeight: 1.4 }}>{prop}</span>
                    {SHIFTS.map(s => (
                      <input key={s.key} type="number" min="0" max="999" placeholder="0"
                        value={getCount(prop, s.key)}
                        onChange={e => updateCount(prop, s.key, e.target.value)}
                        onFocus={e => e.target.style.borderColor = "#FDCC0D"}
                        onBlur={e => e.target.style.borderColor = "#eee"}
                        style={{ width: "100%", background: "#fafafa", border: "1.5px solid #eee", borderRadius: 6, textAlign: "center", padding: "8px 2px", fontSize: 14, fontWeight: 700, color: "#1B1B1B", outline: "none", boxSizing: "border-box", fontFamily: "Nunito, sans-serif" }}
                      />
                    ))}
                    <div style={{ textAlign: "center", fontSize: 14, fontWeight: 800, color: totalForProp(prop) > 0 ? "#1B1B1B" : "#e0e0e0", background: totalForProp(prop) > 0 ? "#FFFBEA" : "transparent", borderRadius: 6, padding: "7px 2px" }}>
                      {totalForProp(prop) || "—"}
                    </div>
                  </div>
                ))}

                {/* Grand Total */}
                <div style={{ background: "#1B1B1B", borderRadius: 10, padding: "14px 18px", marginTop: 14, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <div>
                    <div style={{ fontSize: 11, color: "#777", fontWeight: 600, letterSpacing: 1 }}>TOTAL HK STAFF TODAY</div>
                    <div style={{ fontSize: 11, color: "#555", marginTop: 3 }}>{properties.filter(p => totalForProp(p) > 0).length} of {properties.length} properties filled</div>
                  </div>
                  <div style={{ fontSize: 34, fontWeight: 900, color: "#FDCC0D" }}>{grandTotal}</div>
                </div>

                <div style={{ display: "flex", gap: 10, marginTop: 14 }}>
                  {!prefilledVendor && (
                    <button onClick={() => setStep("select")} style={btnSecondary}>← Back</button>
                  )}
                  <button onClick={handleSubmit} disabled={grandTotal === 0 || submitting}
                    style={{ ...btnPrimary, flex: 1, opacity: grandTotal > 0 && !submitting ? 1 : 0.4 }}>
                    {submitting ? "⏳ Submitting..." : "⚡ Submit Attendance"}
                  </button>
                </div>
              </div>
            )}

            {/* ── STEP 3: Success ── */}
            {step === "done" && (
              <div style={{ ...cardStyle, textAlign: "center" }}>
                <div style={{ width: 68, height: 68, background: "#FDCC0D", borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 30, margin: "0 auto 16px" }}>✓</div>
                <h2 style={{ fontSize: 20, fontWeight: 900, color: "#1B1B1B", marginBottom: 6 }}>Submitted Successfully!</h2>
                <p style={{ fontSize: 13, color: "#888", marginBottom: 8 }}>
                  {vendor} · {formatDate(date)} · <b style={{ color: "#1B1B1B" }}>{grandTotal} staff</b> recorded
                </p>
                <div style={{ background: "#f9f9f9", border: "1px solid #eee", borderRadius: 8, padding: "7px 14px", display: "inline-block", fontSize: 11, color: "#888", marginBottom: 22 }}>
                  🕐 Submitted at: <b style={{ color: "#444" }}>{timestamp}</b>
                </div>

                {/* Summary Table */}
                <div style={{ textAlign: "left", border: "1px solid #eee", borderRadius: 10, overflow: "hidden", marginBottom: 20 }}>
                  <div style={{ background: "#FDCC0D", display: "grid", gridTemplateColumns: "1fr 48px 48px 48px 56px", gap: 4, padding: "9px 12px" }}>
                    {["Property", "A", "B", "C", "Total"].map(h => (
                      <div key={h} style={{ fontSize: 10, fontWeight: 800, color: "#1B1B1B", textAlign: h !== "Property" ? "center" : "left" }}>{h}</div>
                    ))}
                  </div>
                  {submitted.filter(r => r.total > 0).map((r, i) => (
                    <div key={r.property} style={{ display: "grid", gridTemplateColumns: "1fr 48px 48px 48px 56px", gap: 4, padding: "9px 12px", background: i % 2 === 0 ? "#fff" : "#fafafa", borderTop: "1px solid #f0f0f0" }}>
                      <span style={{ fontSize: 11, color: "#333", fontWeight: 600 }}>{r.property}</span>
                      {[r.shiftA, r.shiftB, r.shiftC].map((v, j) => (
                        <span key={j} style={{ fontSize: 12, textAlign: "center", color: "#777" }}>{v || "—"}</span>
                      ))}
                      <span style={{ fontSize: 13, textAlign: "center", fontWeight: 800, color: "#1B1B1B" }}>{r.total}</span>
                    </div>
                  ))}
                  <div style={{ background: "#1B1B1B", display: "grid", gridTemplateColumns: "1fr 48px 48px 48px 56px", gap: 4, padding: "11px 12px" }}>
                    <span style={{ fontSize: 11, fontWeight: 700, color: "#FDCC0D" }}>GRAND TOTAL</span>
                    <span /><span /><span />
                    <span style={{ fontSize: 15, textAlign: "center", fontWeight: 900, color: "#FDCC0D" }}>{grandTotal}</span>
                  </div>
                </div>

                <button onClick={() => { setStep(prefilledVendor ? "fill" : "select"); setCounts({}); if (!prefilledVendor) setVendor(""); }} style={btnPrimary}>
                  + New Submission
                </button>
                <p style={{ fontSize: 11, color: "#bbb", marginTop: 16 }}>✅ Data saved to Google Sheet with timestamp</p>
              </div>
            )}

            <div style={{ textAlign: "center", marginTop: 28, paddingBottom: 20, fontSize: 11, color: "#ccc", fontWeight: 600 }}>
              <span style={{ color: "#FDCC0D" }}>⚡</span> blinkit HK Portal · Housekeeping Ops
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
